plugins {
    id 'java'
    id 'application'
}

version = '0.0.1'

def mindustryVersion = 'master-SNAPSHOT'

sourceSets {
    named("main") {
        java {
            srcDirs = ['core']
        }
    }
}

repositories {
    mavenCentral()
    maven { url "https://www.jitpack.io" }
    flatDir {
        dirs "$rootDir/../Arc/arc-core/build/libs", "$rootDir/../Arc/backends/backend-sdl/build/libs", "$rootDir/../Arc/natives/natives-desktop/build/libs"
    }
}

dependencies {
    implementation "arc-core:arc-core:1.0"
    implementation "backend-sdl:backend-sdl:1.0"
    implementation "natives-desktop:natives-desktop:1.0"
    implementation "com.github.Anuken.Mindustry:core:$mindustryVersion"
}

application {
    mainClass = 'singlaunch.SingularityLauncher'
}
