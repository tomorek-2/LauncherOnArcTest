plugins {
    id 'java'
}

version = '0.0.1'

def mindustryVersion = 'master-SNAPSHOT'

sourceSets {
    named("main") {
        java {
            srcDirs = ['core']
        }
    }
}

repositories {
    mavenCentral()
    maven { url "https://www.jitpack.io" }
}

dependencies{
   implementation "com.github.Anuken.Arc:arc-core:a046279"
    implementation "com.github.Anuken.Arc:arc-backend:a046279"
}
task pluginJar(type: Jar) {
    archiveFileName = "${project.name}.jar" 
    from{
        configurations.runtimeClasspath.collect{ it.isDirectory() ? it : zipTree(it) }
    }




}
