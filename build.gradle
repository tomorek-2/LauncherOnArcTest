plugins {
    id 'java'
}

version = '0.0.1'

def mindustryVersion = 'master-SNAPSHOT'

sourceSets {
    named("main") {
        java {
            srcDirs = ['core']
        }
    }
}

repositories {
    mavenCentral()
    maven { url "https://www.jitpack.io" }
}

dependencies {
    compileOnly "com.github.Anuken.Arc:arc-core:$mindustryVersion"
  //  implementation "com.github.Anuken.Mindustry:core:$mindustryVersion"
}
