plugins {
    id 'java'
}

version = '0.0.1'

def mindustryVersion = 'master-SNAPSHOT'

sourceSets {
    named("main") {
        java {
            srcDirs = ['core']
        }
    }
}

repositories {
    mavenCentral()
    maven { url "https://www.jitpack.io" }
}

dependencies{
    def useLatest = false // BE? БЕ БЕ
    compileOnly useLatest ? "Anuken:MindustryBuilds:latest" : "Anuken:Mindustry:$mindustryVersion"
    annotationProcessor "Anuken:jabel:v1.0.0"
}
