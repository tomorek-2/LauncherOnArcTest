<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Singularity Launcher</title>
<style>
  :root {
    --bg: #1a1a1a;
    --bg-2: #232323;
    --bg-3: #2d2d2d;
    --accent: #ffd379;
    --accent-bright: #ffe89c;
    --text: #e8e8e8;
    --text-dim: #6a6a6a;
    --border: #3a3a3a;
    --danger: #ff7b7b;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    min-height: 100vh;
    overflow: hidden;
    background-image:
      linear-gradient(rgba(255,211,121,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,211,121,0.03) 1px, transparent 1px),
      radial-gradient(circle at 15% 20%, rgba(255, 211, 121, 0.06), transparent 55%);
    background-size: 48px 48px, 48px 48px, auto;
  }
  .launcher {
    width: 920px;
    height: 580px;
    margin: 0 auto;
    background: var(--bg-2);
    border: 2px solid var(--accent);
    display: grid;
    grid-template-rows: auto 1fr auto;
    position: relative;
  }
  header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: var(--bg);
    -webkit-app-region: drag;
  }
  .logo {
    font-family: ui-monospace, monospace;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.14em;
    color: var(--accent);
  }
  .logo span { color: var(--text-dim); font-weight: 400; }
  .version { font-family: ui-monospace, monospace; font-size: 11px; color: var(--text-dim); }
  main {
    display: grid;
    grid-template-columns: 1fr 300px;
    overflow: hidden;
  }
  .preview {
    padding: 20px;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    gap: 14px;
    background: var(--bg);
  }
  .card {
    background: var(--bg-2);
    border: 1px solid var(--border);
    padding: 14px;
  }
  .card h3 {
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--accent);
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .card p, .card li { font-size: 13px; color: var(--text-dim); line-height: 1.5; }
  .card b { color: var(--text); }
  .version-list {
    list-style: none;
    max-height: 180px;
    overflow: auto;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .version-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border: 1px solid var(--border);
    background: var(--bg-3);
    cursor: pointer;
    font-size: 12px;
  }
  .version-item.selected { border-color: var(--accent); color: var(--accent); }
  .version-item .tag { font-size: 10px; color: var(--text-dim); }
  .menu {
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    justify-content: center;
  }
  .btn {
    background: var(--bg-3);
    border: 2px solid var(--accent);
    color: var(--accent);
    padding: 12px 14px;
    font-family: ui-monospace, monospace;
    font-weight: 700;
    font-size: 12px;
    letter-spacing: 0.12em;
    cursor: pointer;
    text-align: left;
    -webkit-app-region: no-drag;
  }
  .btn:hover { background: var(--accent); color: var(--bg); }
  .btn.primary { background: var(--accent); color: var(--bg); }
  .btn.primary:hover { background: var(--accent-bright); }
  footer {
    padding: 10px 20px;
    background: var(--bg);
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-family: ui-monospace, monospace;
    font-size: 11px;
    color: var(--text-dim);
  }
  .progress-wrap {
    height: 3px;
    background: var(--bg-3);
    display: none;
  }
  .progress-wrap.active { display: block; }
  .progress-bar { height: 100%; width: 0%; background: var(--accent); transition: width 0.15s linear; }
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.55);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 50;
  }
  .overlay.open { display: flex; }
  .panel {
    width: 720px;
    max-height: 520px;
    background: var(--bg-2);
    border: 2px solid var(--accent);
    display: flex;
    flex-direction: column;
  }
  .panel-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .panel-body { padding: 16px; overflow: auto; display: flex; flex-direction: column; gap: 12px; }
  .field label { display: block; font-size: 11px; color: var(--text-dim); margin-bottom: 4px; letter-spacing: 0.08em; }
  .field input[type="text"], .field input[type="number"], .field select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 10px;
    font-size: 13px;
  }
  .field input[type="range"] { width: 100%; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .check { display: flex; align-items: center; gap: 8px; font-size: 13px; color: var(--text-dim); }
  .instance-list { display: flex; flex-direction: column; gap: 8px; }
  .instance-item {
    border: 1px solid var(--border);
    padding: 10px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 8px;
    background: var(--bg);
  }
  .instance-item.selected { border-color: var(--accent); }
  .instance-item .name { font-size: 14px; color: var(--text); }
  .instance-item .meta { font-size: 11px; color: var(--text-dim); }
  .instance-actions { display: flex; gap: 6px; }
  .btn-sm {
    border: 1px solid var(--border);
    background: var(--bg-3);
    color: var(--text);
    padding: 4px 8px;
    font-size: 11px;
    cursor: pointer;
  }
  .btn-sm.danger { border-color: var(--danger); color: var(--danger); }
  .btn-sm:disabled { opacity: 0.45; cursor: not-allowed; }
  .mod-list { display: flex; flex-direction: column; gap: 8px; max-height: 280px; overflow: auto; }
  .mod-item {
    border: 1px solid var(--border);
    background: var(--bg);
    padding: 10px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 8px;
    align-items: start;
  }
  .mod-item.incompatible { opacity: 0.55; }
  .mod-item.installed { border-color: var(--accent); }
  .mod-item .title { font-size: 14px; color: var(--text); margin-bottom: 4px; }
  .mod-item .meta { font-size: 11px; color: var(--text-dim); line-height: 1.5; }
  .mod-item .badge { font-size: 10px; color: var(--accent); letter-spacing: 0.08em; }
  .mod-item .badge.bad { color: var(--danger); }
  .mod-actions { display: flex; flex-direction: column; gap: 6px; }
  .mods-toolbar { display: grid; grid-template-columns: 1fr auto; gap: 8px; }
  .mods-summary { font-size: 12px; color: var(--text-dim); }
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(120px);
    background: var(--bg-2);
    border: 2px solid var(--accent);
    color: var(--accent);
    padding: 10px 18px;
    font-family: ui-monospace, monospace;
    font-size: 12px;
    transition: transform 0.2s ease;
    z-index: 100;
    pointer-events: none;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
  <div class="launcher">
    <header>
      <div class="logo">SINGULARITY <span>// MINDUSTRY</span></div>
      <div class="version" id="headerInfo">v0.1</div>
    </header>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <main>
      <section class="preview">
        <div class="card">
          <h3>Текущий инстанс</h3>
          <p id="instanceSummary">—</p>
        </div>
        <div class="card">
          <h3>Версии</h3>
          <ul class="version-list" id="versionList"></ul>
        </div>
        <div class="card">
          <h3>Песочница</h3>
          <p>Каждый инстанс хранит свои <b>сохранения</b>, <b>моды</b> и <b>настройки</b> в отдельной папке (<code>mindustry.data.dir</code>).</p>
        </div>
      </section>

      <nav class="menu">
        <button class="btn primary" onclick="javaApp.play()">ИГРАТЬ</button>
        <button class="btn" onclick="javaApp.instances()">ИНСТАНСЫ</button>
        <button class="btn" onclick="javaApp.settings()">НАСТРОЙКИ</button>
        <button class="btn" onclick="javaApp.mods()">МОДЫ</button>
        <button class="btn" onclick="javaApp.openModsFolder()">ПАПКА МОДОВ</button>
        <button class="btn" onclick="javaApp.openInstanceFolder()">ДАННЫЕ ИНСТАНСА</button>
        <button class="btn" onclick="javaApp.exit()">ВЫХОД</button>
      </nav>
    </main>

    <footer>
      <div id="statusText">Система готова</div>
      <div id="footerPath">—</div>
    </footer>
  </div>

  <div class="overlay" id="settingsOverlay">
    <div class="panel">
      <div class="panel-header">
        <strong>Настройки запуска</strong>
        <button class="btn-sm" onclick="closePanel('settings')">Закрыть</button>
      </div>
      <div class="panel-body">
        <div class="row">
          <div class="field">
            <label>Минимум RAM (МБ)</label>
            <input type="number" id="minMemory" min="256" step="128">
          </div>
          <div class="field">
            <label>Максимум RAM (МБ)</label>
            <input type="number" id="maxMemory" min="512" step="256">
          </div>
        </div>
        <div class="field">
          <label>Путь к Java</label>
          <input type="text" id="javaPath" placeholder="Авто (текущая JVM)">
        </div>
        <div class="field">
          <label>Доп. JVM аргументы</label>
          <input type="text" id="extraJvmArgs" placeholder="-XX:+UseG1GC">
        </div>
        <label class="check">
          <input type="checkbox" id="keepLauncherOpen">
          Держать лаунчер открытым после запуска игры
        </label>
        <button class="btn primary" onclick="saveSettings()">СОХРАНИТЬ</button>
      </div>
    </div>
  </div>

  <div class="overlay" id="instancesOverlay">
    <div class="panel">
      <div class="panel-header">
        <strong>Инстансы</strong>
        <button class="btn-sm" onclick="closePanel('instances')">Закрыть</button>
      </div>
      <div class="panel-body">
        <div class="instance-list" id="instanceList"></div>
        <div class="row">
          <div class="field">
            <label>Новый инстанс</label>
            <input type="text" id="newInstanceName" placeholder="Название">
          </div>
          <div class="field">
            <label>Версия</label>
            <select id="newInstanceVersion"></select>
          </div>
        </div>
        <button class="btn" onclick="createInstance()">СОЗДАТЬ ИНСТАНС</button>
      </div>
    </div>
  </div>

  </div>

  <div class="overlay" id="modsOverlay">
    <div class="panel">
      <div class="panel-header">
        <strong>Браузер модов</strong>
        <button class="btn-sm" onclick="closePanel('mods')">Закрыть</button>
      </div>
      <div class="panel-body">
        <div class="mods-summary" id="modsSummary">Загрузка...</div>
        <div class="row">
          <div class="field">
            <label>Инстанс для установки</label>
            <select id="modsInstanceSelect" onchange="onModsInstanceChange()"></select>
          </div>
          <div class="field">
            <label>Версия игры инстанса</label>
            <input type="text" id="modsGameVersion" readonly>
          </div>
        </div>
        <div class="mods-toolbar">
          <div class="field" style="margin:0">
            <input type="text" id="modsSearch" placeholder="Поиск по названию, автору, репозиторию" oninput="onModsSearch()">
          </div>
          <button class="btn-sm" onclick="javaApp.loadMods(document.getElementById('modsSearch').value || '', document.getElementById('modsInstanceSelect').value)">Обновить</button>
        </div>
        <div class="mod-list" id="modList"></div>
        <div class="field">
          <label>Импорт с GitHub (как в Mindustry)</label>
          <div class="row">
            <input type="text" id="githubModInput" placeholder="author/modname или URL GitHub">
            <button class="btn" onclick="importGithubMod()">ИМПОРТ</button>
          </div>
        </div>
        <button class="btn" onclick="javaApp.openModsFolder()">ОТКРЫТЬ ПАПКУ МОДОВ ИНСТАНСА</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    let state = { settings: {}, instances: [], versions: [] };
    let modsState = { mods: [], instanceId: '', gameVersionLabel: '' };
    let modsSearchTimer;

    function applyBootstrap(data) {
      if (typeof data === 'string') data = JSON.parse(data);
      state = data;
      renderAll();
    }

    function renderAll() {
      const settings = state.settings || {};
      const instances = state.instances || [];
      const versions = state.versions || [];
      const selectedInstance = instances.find(i => i.id === settings.selectedInstanceId) || instances[0];
      const selectedVersion = versions.find(v => v.id === settings.selectedVersionId) || versions[0];

      document.getElementById('headerInfo').textContent =
        (selectedInstance ? selectedInstance.name : '—') + ' · ' + (selectedVersion ? selectedVersion.name : '—');
      document.getElementById('instanceSummary').innerHTML =
        '<b>' + (selectedInstance ? selectedInstance.name : '—') + '</b><br>' +
        'Версия: ' + (selectedVersion ? selectedVersion.name : '—') + '<br>' +
        'RAM: ' + settings.minMemoryMb + '–' + settings.maxMemoryMb + ' МБ';
      document.getElementById('footerPath').textContent = state.launcherDir || '—';

      const versionList = document.getElementById('versionList');
      versionList.innerHTML = '';
      versions.forEach(v => {
        const li = document.createElement('li');
        li.className = 'version-item' + (selectedVersion && v.id === selectedVersion.id ? ' selected' : '');
        li.innerHTML = '<span>' + v.name + '</span><span class="tag">' + (v.cached ? 'кэш' : 'скачать') + '</span>';
        li.onclick = () => {
          javaApp.selectVersion(v.id);
          if (!v.cached) javaApp.downloadVersion(v.id);
          else renderAll();
        };
        versionList.appendChild(li);
      });

      const instanceList = document.getElementById('instanceList');
      if (instanceList) {
        instanceList.innerHTML = '';
        instances.forEach(inst => {
          const row = document.createElement('div');
          row.className = 'instance-item' + (settings.selectedInstanceId === inst.id ? ' selected' : '');
          row.innerHTML =
            '<div><div class="name">' + inst.name + '</div><div class="meta">' + inst.id + '</div></div>' +
            '<div class="instance-actions">' +
              '<button class="btn-sm" onclick="selectInstance(\'' + inst.id + '\')">Выбрать</button>' +
              (inst.id !== 'default' ? '<button class="btn-sm danger" onclick="deleteInstance(\'' + inst.id + '\')">Удалить</button>' : '') +
            '</div>';
          instanceList.appendChild(row);
        });
      }

      const versionSelect = document.getElementById('newInstanceVersion');
      if (versionSelect) {
        versionSelect.innerHTML = '';
        versions.forEach(v => {
          const opt = document.createElement('option');
          opt.value = v.id;
          opt.textContent = v.name;
          versionSelect.appendChild(opt);
        });
      }

      document.getElementById('minMemory').value = settings.minMemoryMb || 512;
      document.getElementById('maxMemory').value = settings.maxMemoryMb || 2048;
      document.getElementById('javaPath').value = settings.javaPath || '';
      document.getElementById('extraJvmArgs').value = settings.extraJvmArgs || '';
      document.getElementById('keepLauncherOpen').checked = settings.keepLauncherOpen !== false;
      renderModsInstanceSelect();
    }

    function renderModsInstanceSelect() {
      const select = document.getElementById('modsInstanceSelect');
      if (!select) return;
      const settings = state.settings || {};
      const instances = state.instances || [];
      select.innerHTML = '';
      instances.forEach(inst => {
        const opt = document.createElement('option');
        opt.value = inst.id;
        opt.textContent = inst.name;
        if (inst.id === (modsState.instanceId || settings.selectedInstanceId)) opt.selected = true;
        select.appendChild(opt);
      });
    }

    function onModsInstanceChange() {
      const select = document.getElementById('modsInstanceSelect');
      modsState.instanceId = select.value;
      javaApp.loadMods(document.getElementById('modsSearch').value || '', select.value);
    }

    function onModsSearch() {
      clearTimeout(modsSearchTimer);
      modsSearchTimer = setTimeout(() => {
        const instanceId = document.getElementById('modsInstanceSelect').value;
        javaApp.loadMods(document.getElementById('modsSearch').value || '', instanceId);
      }, 300);
    }

    function onModsLoaded(data) {
      if (typeof data === 'string') data = JSON.parse(data);
      modsState = data;
      document.getElementById('modsSummary').textContent =
        'Инстанс: ' + data.instanceName + ' · Версия: ' + data.gameVersionLabel +
        ' · Показано модов: ' + (data.mods ? data.mods.length : 0);
      document.getElementById('modsGameVersion').value = data.gameVersionLabel || '—';
      renderModsInstanceSelect();

      const list = document.getElementById('modList');
      list.innerHTML = '';
      (data.mods || []).forEach(mod => {
        const item = document.createElement('div');
        item.className = 'mod-item' +
          (mod.installed ? ' installed' : '') +
          (!mod.compatible ? ' incompatible' : '');
        const req = mod.minGameVersion ? 'Требуется ' + mod.minGameVersion : 'Без ограничения';
        item.innerHTML =
          '<div>' +
            '<div class="title">' + escapeHtml(mod.name || mod.repo) + '</div>' +
            '<div class="meta">' + escapeHtml(mod.author || '') + ' · ★ ' + (mod.stars || 0) + '<br>' +
            escapeHtml((mod.description || '').slice(0, 140)) + '</div>' +
            '<div class="badge ' + (mod.compatible ? '' : 'bad') + '">' +
              (mod.compatible ? 'Совместим' : 'Несовместим') + ' · ' + req +
              (mod.installed ? ' · Установлен' : '') +
            '</div>' +
          '</div>' +
          '<div class="mod-actions">' +
            '<button class="btn-sm" ' + (mod.compatible ? '' : 'disabled') +
              ' onclick="installMod(\'' + escapeAttr(mod.repo) + '\',' + (mod.hasJava ? 'true' : 'false') + ')">' +
              (mod.installed ? 'ПЕРЕУСТАНОВИТЬ' : 'УСТАНОВИТЬ') +
            '</button>' +
          '</div>';
        list.appendChild(item);
      });
    }

    function installMod(repo, hasJava) {
      const instanceId = document.getElementById('modsInstanceSelect').value;
      javaApp.installMod(repo, hasJava, instanceId);
    }

    function importGithubMod() {
      const input = document.getElementById('githubModInput').value;
      const instanceId = document.getElementById('modsInstanceSelect').value;
      javaApp.importGithubMod(input, instanceId);
    }

    function escapeHtml(text) {
      return String(text || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function escapeAttr(text) {
      return String(text || '').replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    }

    function saveSettings() {
      const next = Object.assign({}, state.settings, {
        minMemoryMb: parseInt(document.getElementById('minMemory').value, 10) || 512,
        maxMemoryMb: parseInt(document.getElementById('maxMemory').value, 10) || 2048,
        javaPath: document.getElementById('javaPath').value,
        extraJvmArgs: document.getElementById('extraJvmArgs').value,
        keepLauncherOpen: document.getElementById('keepLauncherOpen').checked
      });
      javaApp.saveSettings(JSON.stringify(next));
      state.settings = next;
      renderAll();
    }

    function createInstance() {
      const name = document.getElementById('newInstanceName').value;
      const versionId = document.getElementById('newInstanceVersion').value;
      javaApp.createInstance(name, versionId);
      document.getElementById('newInstanceName').value = '';
    }

    function selectInstance(id) {
      javaApp.selectInstance(id);
      state.settings.selectedInstanceId = id;
      renderAll();
    }

    function deleteInstance(id) {
      javaApp.deleteInstance(id);
      applyBootstrap(javaApp.getBootstrapData());
    }

    function openPanel(name) {
      document.getElementById(name + 'Overlay').classList.add('open');
      if (name === 'mods') {
        renderModsInstanceSelect();
        const instanceId = document.getElementById('modsInstanceSelect').value;
        javaApp.loadMods(document.getElementById('modsSearch')?.value || '', instanceId);
      }
    }

    function closePanel(name) {
      document.getElementById(name + 'Overlay').classList.remove('open');
    }

    function onSettingsSaved() { showToast('Настройки сохранены'); }
    function onInstanceSelected(name) { showToast('Инстанс: ' + name); renderAll(); }
    function onVersionSelected() { applyBootstrap(javaApp.getBootstrapData()); }

    function setStatus(text) {
      document.getElementById('statusText').textContent = text;
    }

    function setDownloadProgress(value, label) {
      const wrap = document.getElementById('progressWrap');
      const bar = document.getElementById('progressBar');
      if (value < 0) {
        wrap.classList.remove('active');
        bar.style.width = '0%';
        return;
      }
      wrap.classList.add('active');
      bar.style.width = Math.round(value * 100) + '%';
      if (label) setStatus(label);
    }

    function showToast(text) {
      const toast = document.getElementById('toast');
      toast.textContent = text;
      toast.classList.add('show');
      clearTimeout(window._toastTimer);
      window._toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
    }
  </script>
</body>
</html>
